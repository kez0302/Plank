name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plank
          POSTGRES_PASSWORD: plank
          POSTGRES_DB: plank_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://plank:plank@localhost:5432/plank_test
      TEST_DATABASE_URL: postgres://plank:plank@localhost:5432/plank_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Lint
        run: npm run lint

      - name: Test (API integration)
        run: npm run test --workspace=apps/api

      - name: Build
        run: npm run build --workspaces --if-present